<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERNÁCULO</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@300;400&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #010208;
  overflow: hidden;
  font-family: 'Cinzel Decorative', serif;
}

#toggle { display: none; }

/* ══ SKY ══ */
.sky {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(180deg,
    #010209 0%, #020613 40%, #040b20 75%, #050e26 100%);
}

/* ══ STARS ══ */
.stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
.stars::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at  8%  12%, rgba(212,234,255,0.82) 0%, transparent 100%),
    radial-gradient(1px 1px at 16%  28%, rgba(212,234,255,0.55) 0%, transparent 100%),
    radial-gradient(1px 1px at 22%   7%, rgba(212,234,255,0.70) 0%, transparent 100%),
    radial-gradient(1px 1px at 31%  41%, rgba(212,234,255,0.45) 0%, transparent 100%),
    radial-gradient(1px 1px at 38%  18%, rgba(212,234,255,0.65) 0%, transparent 100%),
    radial-gradient(1px 1px at 44%  33%, rgba(212,234,255,0.40) 0%, transparent 100%),
    radial-gradient(1px 1px at 52%   5%, rgba(212,234,255,0.76) 0%, transparent 100%),
    radial-gradient(1px 1px at 59%  22%, rgba(212,234,255,0.50) 0%, transparent 100%),
    radial-gradient(1px 1px at 63%  48%, rgba(212,234,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 71%  14%, rgba(212,234,255,0.60) 0%, transparent 100%),
    radial-gradient(1px 1px at 77%  37%, rgba(212,234,255,0.48) 0%, transparent 100%),
    radial-gradient(1px 1px at 84%   9%, rgba(212,234,255,0.72) 0%, transparent 100%),
    radial-gradient(1px 1px at 89%  55%, rgba(212,234,255,0.38) 0%, transparent 100%),
    radial-gradient(1px 1px at 94%  26%, rgba(212,234,255,0.58) 0%, transparent 100%),
    radial-gradient(1px 1px at  5%  63%, rgba(212,234,255,0.44) 0%, transparent 100%),
    radial-gradient(1px 1px at 13%  71%, rgba(212,234,255,0.33) 0%, transparent 100%),
    radial-gradient(1px 1px at 27%  58%, rgba(212,234,255,0.52) 0%, transparent 100%),
    radial-gradient(1px 1px at 48%  67%, rgba(212,234,255,0.28) 0%, transparent 100%),
    radial-gradient(1px 1px at 66%  74%, rgba(212,234,255,0.42) 0%, transparent 100%),
    radial-gradient(1px 1px at 82%  80%, rgba(212,234,255,0.36) 0%, transparent 100%);
  animation: twinkleA 5.5s ease-in-out infinite alternate;
}
.stars::after {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(1.4px 1.4px at  3%  19%, rgba(220,240,255,0.90) 0%, transparent 100%),
    radial-gradient(1.4px 1.4px at 18%  44%, rgba(220,240,255,0.60) 0%, transparent 100%),
    radial-gradient(1.4px 1.4px at 29%   3%, rgba(220,240,255,0.80) 0%, transparent 100%),
    radial-gradient(1.4px 1.4px at 41%  57%, rgba(220,240,255,0.50) 0%, transparent 100%),
    radial-gradient(1.4px 1.4px at 55%  31%, rgba(220,240,255,0.70) 0%, transparent 100%),
    radial-gradient(1.4px 1.4px at 68%  16%, rgba(220,240,255,0.55) 0%, transparent 100%),
    radial-gradient(1.4px 1.4px at 75%  62%, rgba(220,240,255,0.45) 0%, transparent 100%),
    radial-gradient(1.4px 1.4px at 88%  42%, rgba(220,240,255,0.65) 0%, transparent 100%),
    radial-gradient(1.4px 1.4px at 96%  78%, rgba(220,240,255,0.40) 0%, transparent 100%),
    radial-gradient(1.4px 1.4px at 11%  83%, rgba(220,240,255,0.35) 0%, transparent 100%),
    radial-gradient(1.4px 1.4px at 34%  77%, rgba(220,240,255,0.48) 0%, transparent 100%),
    radial-gradient(1.4px 1.4px at 57%  85%, rgba(220,240,255,0.38) 0%, transparent 100%),
    radial-gradient(1.4px 1.4px at 79%  91%, rgba(220,240,255,0.30) 0%, transparent 100%);
  animation: twinkleB 7s ease-in-out infinite alternate;
}
@keyframes twinkleA { from { opacity: 0.55; } to { opacity: 1.00; } }
@keyframes twinkleB { from { opacity: 0.80; } to { opacity: 0.40; } }

/* ══ COMETAS ══ */
.meteors { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.meteor {
  position: absolute; top: 0;
  width: 2px; height: 120px;
  border-radius: 50% 50% 0 0;
  background: linear-gradient(180deg,
    rgba(255,255,255,0.00) 0%,
    rgba(220,238,255,0.10) 30%,
    rgba(235,248,255,0.60) 70%,
    rgba(255,255,255,0.95) 100%);
  filter: blur(0.6px);
  transform-origin: bottom center;
  opacity: 0;
}
.meteor::after {
  content: '';
  position: absolute; bottom: -3px; left: 50%;
  transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%;
  background: white;
  box-shadow: 0 0 4px 2px rgba(220,240,255,0.90), 0 0 10px 4px rgba(200,228,255,0.50);
}
@keyframes meteorFall {
  0%   { transform: translateY(-140px) rotate(-35deg); opacity: 0; }
  5%   { opacity: 1; }
  80%  { opacity: 0.6; }
  100% { transform: translateY(110vh) rotate(-35deg); opacity: 0; }
}
.meteor:nth-child(1)  { left:  8%; animation: meteorFall 3.2s linear infinite; animation-delay:  1.1s; }
.meteor:nth-child(2)  { left: 15%; animation: meteorFall 4.5s linear infinite; animation-delay:  5.8s; }
.meteor:nth-child(3)  { left: 24%; animation: meteorFall 3.8s linear infinite; animation-delay:  2.3s; }
.meteor:nth-child(4)  { left: 33%; animation: meteorFall 5.1s linear infinite; animation-delay:  8.4s; }
.meteor:nth-child(5)  { left: 42%; animation: meteorFall 3.5s linear infinite; animation-delay:  0.6s; }
.meteor:nth-child(6)  { left: 51%; animation: meteorFall 4.2s linear infinite; animation-delay: 12.0s; }
.meteor:nth-child(7)  { left: 60%; animation: meteorFall 3.9s linear infinite; animation-delay:  3.7s; }
.meteor:nth-child(8)  { left: 68%; animation: meteorFall 4.8s linear infinite; animation-delay:  7.2s; }
.meteor:nth-child(9)  { left: 75%; animation: meteorFall 3.3s linear infinite; animation-delay: 15.5s; }
.meteor:nth-child(10) { left: 83%; animation: meteorFall 4.1s linear infinite; animation-delay:  4.9s; }
.meteor:nth-child(11) { left: 90%; animation: meteorFall 5.4s linear infinite; animation-delay: 10.2s; }
.meteor:nth-child(12) { left: 97%; animation: meteorFall 3.6s linear infinite; animation-delay: 18.8s; }

/* ══ LUA ══ */
.moon-wrap {
  position: fixed;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  transition: top 2.2s cubic-bezier(0.22, 0.8, 0.36, 1) 0.5s;
}
#toggle:checked ~ .moon-wrap { top: 18%; }

.moon {
  width: 92px; height: 92px; border-radius: 50%;
  background: radial-gradient(circle at 35% 32%, #eef6ff 0%, #cfe1f8 50%, #9ec0db 100%);
  animation: moonPulse 4s ease-in-out infinite alternate, moonSurge 9s ease-in-out infinite;
  position: relative; z-index: 2;
}
.moon-crescent {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(calc(-50% + 20px), calc(-50% - 4px));
  width: 78px; height: 78px; border-radius: 50%;
  background: #010209; z-index: 3; pointer-events: none;
}
@keyframes moonPulse {
  from { box-shadow: 0 0 18px 4px rgba(215,238,255,0.38), 0 0 55px 18px rgba(200,228,255,0.18), 0 0 110px 40px rgba(175,212,250,0.08), 0 0 220px 80px rgba(145,190,245,0.03); }
  to   { box-shadow: 0 0 28px 8px rgba(215,238,255,0.80), 0 0 80px 30px rgba(200,228,255,0.52), 0 0 160px 64px rgba(175,212,250,0.28), 0 0 320px 120px rgba(145,190,245,0.12); }
}
@keyframes moonSurge {
  0%,100% { filter: brightness(1); }
  50%     { filter: brightness(1.42) saturate(1.14); }
}

/* ══ LOCK SCREEN ══ */
#screen-lock {
  position: fixed; inset: 0; z-index: 10;
  transition: opacity 1.8s ease;
}
#toggle:checked ~ #screen-lock { opacity: 0; pointer-events: none; }

.lock-btn {
  position: fixed; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 130px; height: 130px;
  border-radius: 50%; cursor: pointer; z-index: 11;
}
.lock-btn::before {
  content: ''; position: absolute; inset: 0; border-radius: 50%;
  border: 1.2px solid rgba(195,225,255,0.38);
  animation: ringBreath 3.6s ease-in-out infinite alternate;
}
.lock-btn:hover::before { border-color: rgba(220,240,255,0.75); animation: none; }
@keyframes ringBreath {
  from { box-shadow: 0 0 12px 2px rgba(195,225,255,0.08); }
  to   { box-shadow: 0 0 24px 6px rgba(195,225,255,0.20); }
}

/* ══ FLASH ══ */
#flash {
  position: fixed; inset: 0; z-index: 20;
  pointer-events: none; opacity: 0;
  background: radial-gradient(ellipse 80% 70% at 50% 50%,
    #ffffff 0%, rgba(235,246,255,0.97) 5%,
    rgba(205,232,255,0.72) 16%, rgba(170,212,255,0.30) 36%,
    rgba(130,185,250,0.08) 58%, transparent 72%);
}
#toggle:checked ~ #flash { animation: flashBang 3.4s ease forwards; }
@keyframes flashBang {
  0%  { opacity: 1; } 4% { opacity: 1; } 100% { opacity: 0; }
}

/* ══ PROFILE SCREEN ══ */
#screen-profile {
  position: fixed; inset: 0; z-index: 8;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 2s ease 0.6s;
}
#toggle:checked ~ #screen-profile { opacity: 1; pointer-events: auto; }

.portrait-outer {
  position: relative;
  width: 210px; height: 210px;
  margin-bottom: 42px; margin-top: 80px;
  display: flex; align-items: center; justify-content: center;
}

/* ══ BÚSSOLA ══ */
.compass-outer-svg, .compass-inner-svg { position: absolute; pointer-events: none; }
.compass-outer-svg { width: 298px; height: 298px; animation: spinCompass 28s linear infinite; }
.compass-inner-svg { width: 262px; height: 262px; animation: spinCompass 18s linear infinite reverse; }
@keyframes spinCompass { to { transform: rotate(360deg); } }

/* ══ HALO ══ */
.halo {
  position: absolute; inset: -80px; border-radius: 50%; pointer-events: none;
  background: radial-gradient(circle, rgba(175,215,255,0.28) 0%, rgba(155,200,252,0.12) 40%, rgba(135,185,248,0.04) 70%, transparent 100%);
  animation: haloPulse 4s ease-in-out infinite alternate;
}
@keyframes haloPulse {
  from { opacity: 0.55; transform: scale(0.92); }
  to   { opacity: 1.00; transform: scale(1.08); }
}

/* ══ RETRATO ══ */
.portrait-mask {
  width: 210px; height: 210px; border-radius: 50%; overflow: hidden;
  position: relative; z-index: 2; cursor: crosshair;
  box-shadow:
    0 0  0px  1px rgba(195,225,255,0.30),
    0 0 18px  6px rgba(190,222,255,0.45),
    0 0 45px 16px rgba(175,215,252,0.22),
    0 0 90px 32px rgba(160,205,248,0.10),
    0 0 160px 60px rgba(145,195,245,0.05);
  transition: box-shadow 0.6s ease, filter 0.6s ease;
}
.portrait-mask:hover {
  box-shadow:
    0 0   0px  1px rgba(220,240,255,0.60),
    0 0  22px  8px rgba(210,235,255,0.80),
    0 0  55px 22px rgba(195,228,255,0.55),
    0 0 110px 45px rgba(175,215,252,0.32),
    0 0 200px 85px rgba(155,205,248,0.18),
    0 0 340px 130px rgba(140,195,245,0.08);
  filter: brightness(1.12) saturate(1.08);
}
.portrait-mask::before {
  content: ''; position: absolute; inset: 0; border-radius: 50%; z-index: 4;
  background: radial-gradient(circle at 38% 28%, rgba(220,240,255,0.00), transparent 60%);
  transition: background 0.6s ease;
}
.portrait-mask:hover::before {
  background: radial-gradient(circle at 38% 28%, rgba(220,240,255,0.22), transparent 55%);
}
.portrait-mask img {
  width: 100%; height: 100%; object-fit: cover; object-position: center 8%;
  filter: saturate(0.2) brightness(0.74) contrast(1.10);
  transition: filter 0.6s ease;
}
.portrait-mask:hover img { filter: saturate(0.28) brightness(0.85) contrast(1.08); }
.portrait-mask::after {
  content: ''; position: absolute; inset: 0; border-radius: 50%; z-index: 3;
  background: radial-gradient(circle at 38% 28%, rgba(200,228,255,0.12), transparent 60%);
}

/* ══ NOME ══ */
.name-main {
  font-family: 'Cinzel Decorative', serif; font-weight: 300;
  font-size: clamp(2.4rem, 5.5vw, 3.6rem);
  letter-spacing: 0.20em; color: #dceeff;
  text-align: center; line-height: 1; display: block;
  animation: nameGlow 4s ease-in-out infinite alternate;
}
@keyframes nameGlow {
  from { text-shadow: 0 0 16px rgba(200,230,255,0.38), 0 0 45px rgba(175,215,255,0.14); }
  to   { text-shadow: 0 0 30px rgba(200,230,255,0.72), 0 0 90px rgba(175,215,255,0.36), 0 0 160px rgba(150,200,250,0.16); }
}
.name-rule {
  display: block; margin: 16px auto 0; width: 70px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(180,215,255,0.40), transparent);
}
</style>
</head>
